name: Simple App Example

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]

jobs:
  build-and-run:
    name: Build and run simple-app example
    permissions:
      contents: read
    # clang -arch armv7 cross-compilation is only supported on Apple platforms
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build armvm-compiler
      run: make

    - name: Build simple-app example
      run: make -C examples/simple-app

    - name: Run simple-app example
      run: make -C examples/simple-app run
